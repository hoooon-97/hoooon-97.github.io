<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#fff; --fg:#1a1a1a; --muted:#666; --line:#eee; --accent:#2563eb; --accent-soft:#eff6ff; --code-bg:#f6f8fa; --tag-bg:#f3f4f6; }
    @media (prefers-color-scheme:dark) { :root { --bg:#0a0a0a; --fg:#e5e5e5; --muted:#999; --line:#222; --accent:#60a5fa; --accent-soft:#1e3a5f; --code-bg:#161b22; --tag-bg:#1f2937; } }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Inter","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--fg); line-height:1.75; font-size:17px; }
    .container { max-width:720px; margin:0 auto; padding:60px 24px; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    h1 { font-size:2.2rem; font-weight:700; line-height:1.3; margin-bottom:12px; letter-spacing:-0.02em; }
    h2 { font-size:1.5rem; font-weight:600; margin-top:48px; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--line); }
    h3 { font-size:1.2rem; font-weight:600; margin-top:32px; margin-bottom:12px; }
    p { margin-bottom:20px; }
    ul,ol { margin-bottom:20px; padding-left:24px; }
    li { margin-bottom:8px; }
    code { font-family:SFMono-Regular,Consolas,monospace; background:var(--code-bg); padding:2px 6px; border-radius:4px; font-size:0.88em; }
    pre { background:var(--code-bg); padding:20px; overflow-x:auto; border-radius:8px; margin-bottom:24px; font-size:0.85em; line-height:1.6; }
    pre code { background:none; padding:0; }
    blockquote { border-left:3px solid var(--accent); padding-left:20px; margin:24px 0; color:var(--muted); }
    .meta { color:var(--muted); font-size:14px; margin-bottom:40px; display:flex; gap:16px; align-items:center; }
    .meta a { color:var(--muted); }
    .tags { margin-top:48px; padding-top:24px; border-top:1px solid var(--line); }
    .tag { display:inline-block; background:var(--tag-bg); padding:6px 14px; border-radius:20px; font-size:13px; margin-right:8px; margin-bottom:8px; color:var(--muted); transition:all 0.15s; }
    .tag:hover { background:var(--accent-soft); color:var(--accent); text-decoration:none; }
    .nav { margin-bottom:48px; }
    .nav a { font-size:14px; color:var(--muted); }
    .nav a:hover { color:var(--accent); }
    @media (max-width:600px) { .container { padding:32px 20px; } h1 { font-size:1.7rem; } body { font-size:16px; } }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav"><a href="{{ site.baseurl }}/">← Home</a></nav>
    <article>
      <h1>{{ page.title }}</h1>
      <div class="meta">
        <span>{{ page.date | date: "%Y.%m.%d" }}</span>
        <span>{% if page.tags.size > 0 %}{{ page.tags | join: ", " }}{% endif %}</span>
      </div>
      {{ content }}
    </article>
    {% if page.tags.size > 0 %}
    <div class="tags">
      {% for tag in page.tags %}
        <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</body>
</html>
